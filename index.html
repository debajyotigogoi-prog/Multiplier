  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-weight:300;\n  background:var(--bg1);\n  color:var(--light);\n  line-height:1.6;\n  overflow-x:hidden;\n  cursor:none;\n}\n@media (max-width: 900px){ body{ cursor:auto; } .cursor-dot,.cursor-ring{ display:none; } }\n\n/* Fixed video background */\n.bg-video{\n  position:fixed;inset:0;\n  width:100vw;height:100vh;\n  object-fit:cover;\n  z-index:-2;\n  pointer-events:none;\n}\n/* Dark vignette + tint overlay so text stays readable */\n.bg-shade{\n  position:fixed;inset:0;\n  z-index:-1;pointer-events:none;\n  background:\n    radial-gradient(ellipse at 30% 20%, rgba(255,90,0,0.08), transparent 55%),\n    radial-gradient(ellipse at 80% 80%, rgba(255,122,48,0.06), transparent 60%),\n    linear-gradient(180deg, rgba(8,8,8,0.55), rgba(8,8,8,0.65));\n}\n/* Page sections become semi-transparent so video shows through;\n   container padding/cards keep their solidity for readability */\nsection{ background-color: transparent !important; }\n\n/* Noise overlay */\nbody::before{\n  content:'';\n  position:fixed;inset:0;\n  pointer-events:none;\n  z-index:9998;\n  opacity:.035;\n  background-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><\u002Ffilter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/><\u002Fsvg>\");\n}\n\n/* Progress bar */\n.progress{\n  position:fixed;top:0;left:0;height:2px;\n  background:var(--orange);\n  width:0%;\n  z-index:10000;\n  transition:width .08s linear;\n}\n\n/* Custom cursor */\n.cursor-dot,.cursor-ring{\n  position:fixed;top:0;left:0;pointer-events:none;\n  z-index:10001;\n  border-radius:50%;\n  transform:translate(-50%,-50%);\n}\n.cursor-dot{\n  width:8px;height:8px;background:var(--orange);\n  transition:transform .12s;\n}\n.cursor-ring{\n  width:36px;height:36px;\n  border:1.5px solid var(--orange);\n  transition:transform .25s,width .2s,height .2s,border-color .2s;\n}\n\n/* Nav */\nnav.topnav{\n  position:fixed;top:8px;left:0;right:0;z-index:9999;\n  display:flex;justify-content:center;\n  pointer-events:none;\n}\nnav.topnav .inner{\n  pointer-events:auto;\n  display:flex;align-items:center;gap:8px;\n  padding:10px 14px;\n  background:rgba(8,8,8,0.65);\n  backdrop-filter:blur(14px);\n  -webkit-backdrop-filter:blur(14px);\n  border:1px solid var(--border);\n  border-radius:999px;\n  font-family:'Jost',sans-serif;\n}\nnav.topnav .brand{\n  font-family:'Syne',sans-serif;font-weight:800;\n  color:var(--white);font-size:.85rem;\n  letter-spacing:.04em;\n  padding-right:10px;border-right:1px solid var(--border);\n  margin-right:6px;\n}\nnav.topnav .brand span{color:var(--orange)}\nnav.topnav a{\n  color:var(--grey);text-decoration:none;\n  font-size:.72rem;letter-spacing:.08em;\n  padding:6px 10px;border-radius:999px;\n  transition:color .2s,background .2s;\n  text-transform:uppercase;\n}\nnav.topnav a:hover{color:var(--white)}\nnav.topnav a.active{color:var(--orange);background:var(--orange-dim)}\n@media (max-width:900px){\n  nav.topnav .inner a:not(.cta){display:none}\n}\n\n/* Section base */\nsection{\n  position:relative;\n  padding:140px 6vw;\n  overflow:hidden;\n}\n.container{max-width:1280px;margin:0 auto}\n\n.section-label{\n  font-family:'Jost',sans-serif;\n  font-size:.65rem;\n  letter-spacing:.28em;\n  text-transform:uppercase;\n  color:var(--orange);\n  font-weight:500;\n  margin-bottom:24px;\n  display:inline-block;\n}\n\nh1,h2,h3{\n  font-family:'Syne',sans-serif;\n  font-weight:800;\n  color:var(--white);\n  line-height:1;\n  letter-spacing:-.02em;\n  text-wrap:balance;\n}\nh2{font-size:clamp(2.4rem,5.4vw,4.6rem);margin-bottom:28px;line-height:1.02}\nh3{font-size:1.4rem;line-height:1.15;margin-bottom:14px}\n.accent{color:var(--orange)}\n.serif-italic{\n  font-family:'DM Serif Display',serif;font-style:italic;font-weight:400;\n  color:var(--light);\n}\n\np{color:var(--grey);font-size:1.02rem;max-width:62ch;text-wrap:pretty}\n.lead{color:var(--light);font-size:1.1rem;max-width:64ch}\n\n/* Reveal */\n.reveal{opacity:0;transform:translateY(28px);transition:opacity .9s ease,transform .9s ease}\n.reveal.in{opacity:1;transform:none}\n\n/* Add backdrop-blur to all glassy surfaces for legibility over video */\n.card,.mandate-card,.flow-wrap,.pull-quote,.big-num-card,.state-card,\n.tier-row,.phase-card,.savings-card,.prop,.portal-mock,.world-wrap,\n.net-card,.cred-tile,.flow-box,.corridor,.portal-search,.alert-bar,\n.chip-dark,.portal-chrome,.portal-body{\n  backdrop-filter:blur(22px) saturate(140%);\n  -webkit-backdrop-filter:blur(22px) saturate(140%);\n}\n/* Text shadow on prose & large headings to keep them legible over any frame */\n.hero-name,.close-h{ text-shadow:0 4px 40px rgba(0,0,0,0.7); }\nh1,h2,h3,.hero-sub,p,.lead,.serif-italic,.section-label,.label,.tier-pct,.big-num,.close-quote,.model-quote,.pull-quote,.cred-tile .role,.who,.flow-foot,.tech-section .lbl,.kpis .chip,.col-head,.savings-card .amt,.savings-card .typ,.savings-card h3,.corridor .ttl,.corridor .meta,.corridor .updated,.alert-bar,.portal-body h4,.portal-body .psub,.portal-search,.world-legend,.net-card h3,.net-card p,footer .col .lbl,footer .col .val{\n  text-shadow:0 1px 2px rgba(0,0,0,0.6);\n}\n\n/* Card base — orange left border */\n.card{\n  background:var(--bg3);\n  border:1px solid var(--border);\n  border-left:3px solid var(--orange);\n  padding:32px;\n  border-radius:2px;\n  transition:transform .3s ease,border-color .3s ease,background .3s ease;\n}\n.card:hover{transform:translateY(-6px);border-left-color:var(--orange-light)}\n.card .label{\n  font-size:.65rem;letter-spacing:.28em;\n  text-transform:uppercase;color:var(--orange);\n  margin-bottom:14px;display:block;font-weight:500;\n}\n\n/* Pill */\n.pill{\n  display:inline-flex;align-items:center;gap:6px;\n  padding:7px 14px;\n  border:1px solid var(--orange-mid);\n  border-radius:999px;\n  font-size:.72rem;letter-spacing:.12em;\n  text-transform:uppercase r-spacing:.22em;\n  text-transform:uppercase;font-weight:500;\n  padding:5px 12px;border-radius:999px;margin-bottom:18px;\n}\n.state-card.bad .tag{background:rgba(255,112,112,.12);color:var(--red);border:1px solid rgba(255,112,112,.3)}\n.state-card.good .tag{background:rgba(72,199,142,.12);color:var(--green);border:1px solid rgba(72,199,142,.3)}\n.state-card h3{margin-bottom:24px;font-size:1.3rem}\n.state-list{list-style:none;display:flex;flex-direction:column;gap:14px}\n.state-list li{\n  display:grid;grid-template-columns:24px 1fr;gap:12px;\n  font-size:.92rem;line-height:1.5;color:var(--grey);\n  padding-bottom:14px;border-bottom:1px dashed var(--border);\n}\n.state-list li:last-child{border-bottom:none}\n.state-list li::before{\n  font-family:'Jost';font-weight:500;\n}\n.state-card.bad .state-list li::before{content:'✕';color:var(--red)}\n.state-card.good .state-list li::before{content:'→';color:var(--orange)}\n\n.arrow-col{\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  gap:18px;\n}\n.arrow-col .line{width:1px;flex:1;background:linear-gradient(to bottom,transparent,var(--orange),transparent)}\n.arrow-col .lbl{\n  font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;\n  color:var(--orange);font-weight:500;writing-mode:vertical-rl;\n  transform:rotate(180deg);\n}\n@media(max-width:1000px){.arrow-col .line{height:1px;width:60%;background:linear-gradient(to right,transparent,var(--orange),transparent)}.arrow-col .lbl{writing-mode:horizontal-tb;transform:none}}\n\n.model-quote{\n  margin-top:54px;\n  text-align:center;padding:54px 40px;\n  border:1px solid var(--orange-mid);\n  background:linear-gradient(180deg,rgba(255,90,0,0.04),transparent);\n  border-radius:2px;\n  font-family:'DM Serif Display',serif;font-style:italic;\n  font-size:clamp(1.3rem,2.4vw,2rem);line-height:1.35;\n  color:var(--white);\n  text-wrap:balance;\n}\n\n/* ============ S05 — Three-Tier ============ */\n.s-tiers{background:var(--bg1)}\n.tiers-head{\n  display:grid;grid-template-columns:1fr 1fr;gap:80px;\n  margin-bottom:80px;align-items:end;\n}\n@media(max-width:1000px){.tiers-head{grid-template-columns:1fr;gap:32px}}\n\n.tier-row{\n  display:grid;\n  grid-template-columns:280px 1fr 120px;\n  gap:32px;align-items:center;\n  background:var(--bg3);border:1px solid var(--border);\n  border-left:3px solid var(--orange);\n  padding:34px 36px;border-radius:2px;\n  margin-bottom:14px;\n  transition:transform .3s ease,border-color .3s ease;\n}\n.tier-row:hover{transform:translateX(6px);border-left-color:var(--orange-light)}\n@media(max-width:900px){.tier-row{grid-template-columns:1fr;gap:18px}}\n.tier-meta .label{\n  font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;\n  color:var(--orange);font-weight:500;margin-bottom:8px;display:block;\n}\n.tier-meta h3{font-size:1.4rem;margin-bottom:6px}\n.tier-meta .who{font-size:.84rem;color:var(--grey);margin-bottom:12px}\n.tier-row p{font-size:.95rem;color:var(--light)}\n.tier-pct{\n  font-family:'Syne',sans-serif;font-weight:800;\n  font-size:3.4rem;color:var(--orange);line-height:1;\n  text-align:right;letter-spacing:-.03em;\n}\n@media(max-width:900px){.tier-pct{text-align:left;font-size:2.4rem}}\n\n/* ============ S06 — 90-Day Roadmap ============ */\n.s-roadmap{background:var(--bg2)}\n.timeline{\n  position:relative;padding-left:48px;\n  margin-top:40px;\n}\n.timeline::before{\n  content:'';position:absolute;left:11px;top:0;bottom:0;\n  width:2px;background:linear-gradient(180deg,var(--orange),var(--orange-light),transparent);\n}\n.phase{\n  position:relative;margin-bottom:44px;\n}\n.phase::before{\n  content:'';position:absolute;left:-43px;top:14px;\n  width:14px;height:14px;border-radius:50%;\n  background:var(--orange);\n  box-shadow:0 0 0 4px rgba(255,90,0,.15),0 0 0 8px rgba(255,90,0,.06);\n}\n.phase-day{\n  font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;\n  color:var(--orange);font-weight:500;margin-bottom:14px;display:block;\n}\n.phase- border:1px solid var(--border);\n  padding:24px 26px;border-radius:2px;margin-bottom:14px;\n  transition:transform .3s ease,border-color .3s ease;\n}\n.savings-card.red{border-left:3px solid var(--red)}\n.savings-card.green{border-left:3px solid var(--green)}\n.savings-card:hover{transform:translateY(-3px)}\n.savings-card .typ{\n  font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;\n  font-weight:500;margin-bottom:10px;display:block;\n}\n.savings-card.red .typ{color:var(--red)}\n.savings-card.green .typ{color:var(--green)}\n.savings-card h3{font-size:1.05rem;margin-bottom:8px}\n.savings-card p{font-size:.88rem;color:var(--grey);margin-bottom:10px}\n.savings-card .amt{\n  font-family:'Syne';font-weight:800;color:var(--white);\n  font-size:1.05rem;letter-spacing:-.01em;\n}\n.redirect{\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  gap:14px;height:100%;min-height:240px;padding-top:40px;\n}\n.redirect .circle{\n  width:84px;height:84px;border-radius:50%;\n  border:1px solid var(--orange-mid);\n  background:var(--orange-dim);\n  display:flex;align-items:center;justify-content:center;\n  font-size:2rem;color:var(--orange);\n}\n.redirect .lbl{\n  font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;\n  color:var(--orange);font-weight:500;text-align:center;\n}\n\n/* ============ S08 — Portal ============ */\n.s-portal{background:var(--bg2)}\n.portal-grid{\n  display:grid;grid-template-columns:1fr 1.1fr;\n  gap:64px;align-items:start;\n}\n@media(max-width:1100px){.portal-grid{grid-template-columns:1fr}}\n.props{display:flex;flex-direction:column;gap:18px;margin-top:36px}\n.prop{\n  display:grid;grid-template-columns:54px 1fr;gap:18px;\n  padding:24px;background:var(--bg3);\n  border:1px solid var(--border);border-left:3px solid var(--orange);\n  border-radius:2px;transition:transform .3s ease;\n}\n.prop:hover{transform:translateY(-3px)}\n.prop .ic{\n  width:48px;height:48px;display:flex;align-items:center;justify-con  216); cursor: crosshair; font-family: Times;\">\n\n<video class=\"bg-video\" id=\"bgvid\" autoplay=\"\" muted=\"\" loop=\"\" playsinline=\"\" preload=\"auto\"><\u002Fvideo>\n<script>\n  // Set video src after page mount so the bundler doesn't try to inline this large remote asset.\n  (function(){\n    var v = document.getElementById('bgvid');\n    if (v) v.src = 'https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260424_064411_9e9d7f84-9277-41f4-ab10-59172d89e6be.mp4';\n  })();\n<\u002Fscript>\n<div class=\"bg-shade\"><\u002Fdiv>\n\n<div class=\"cursor-dot\" id=\"cdot\" style=\"transform: translate(1011px, 210px) translate(-50%, -50%);\"><\u002Fdiv>\n<div class=\"cursor-ring\" id=\"cring\" style=\"transform: translate(1011px, 210px) translate(-50%, -50%); width: 36px; height: 36px; border-color: rgb(255, 90, 0);\"><\u002Fdiv>\n<div class=\"progress\" id=\"progress\" style=\"width: 21.5834%;\"><\u002Fdiv>\n\n<nav class=\"topnav\">\n  <div class=\"inner\">\n    <span class=\"brand\">DG<span>×<\u002Fspan>M<\u002Fspan>\n    <a href=\"#hero\" data-target=\"hero\" class=\"\">Intro<\u002Fa>\n    <a href=\"#diagnosis\" data-target=\"diagnosis\" class=\"\">Diagnosis<\u002Fa>\n    <a href=\"#cost\" data-target=\"cost\" class=\"active\">Cost<\u002Fa>\n    <a href=\"#model\" data-target=\"model\">Model<\u002Fa>\n    <a href=\"#tiers\" data-target=\"tiers\">Architecture<\u002Fa>\n    <a href=\"#roadmap\" data-target=\"roadmap\">90 Days<\u002Fa>\n    <a href=\"#savings\" data-target=\"savings\">Reinvest<\u002Fa>\n    <a href=\"#portal\" data-target=\"portal\">Portal<\u002Fa>\n    <a href=\"#network\" data-target=\"network\">Network<\u002Fa>\n    <a href=\"#creds\" data-target=\"creds\">Credentials<\u002Fa>\n    <a href=\"#close\" data-target=\"close\">Close<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ====== SECTION 01 — HERO ====== -->\n<section id=\"hero\" class=\"hero\">\n  <div class=\"container\">\n    <div class=\"hero-grid\">\n      <div>\n        <div class=\"hero-pills reveal in\" style=\"transition-delay: 0ms;\">\n          <span class=\"pill\">Post-Interview Blueprint<\u002Fspan>\n          <span class=\"pill\">Mobility Senior Manager, EOR<\u002Fspan>\n          <span class=\"pill\">Multiplier<\u002Fspan>\n        <\u002Fdiv>\n        <h1 class=\"hero-name reveal in\" style=\"transition-delay: 60ms;\">DEB<span class=\"last\">GOGOI<\u002Fspan><\u002Fh1>\n        <p class=\"hero-sub reveal in\" style=\"transition-delay: 120ms;\">\"The expert who will build Multiplier's mobility function from greenfield to competitive moat, in 90 days and beyond.\"<\u002Fp>\n        <div class=\"stats reveal in\" style=\"transition-delay: 180ms;\">\n          <div class=\"cell\"><div class=\"num\" data-count=\"19\" data-suffix=\"+\" data-done=\"1\">19+<\u002Fdiv><div class=\"lbl\" style=\"color: rgb(250, 247, 247)\">Years<\u002Fdiv><\u002Fdiv>\n          <div class=\"cell\"><div class=\"num\" data-count=\"21\" data-suffix=\"+\" data-done=\"1\">21+<\u002Fdiv><div class=\"lbl\" style=\"color: rgb(250, 247, 247)\">Countries<\u002Fdiv><\u002Fdiv>\n          <div class=\"cell\"><div class=\"num\" data-count=\"10\" data-suffix=\"K+\" data-done=\"1\">10K+<\u002Fdiv><div class=\"lbl\" style=\"color: rgb(250, 247, 247)\">Employees<\u002Fdiv><\u002Fdiv>\n          <div class=\"cell\"><div class=\"num\" data-count=\"56\" data-suffix=\"+\" data-done=\"1\">56+<\u002Fdiv><div class=\"lbl\" style=\"color: rgb(250, 247, 247)\">Team Led<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mandate-card reveal in\" style=\"transition-delay: 240ms;\">\n        <div class=\"qmark\">\"<\u002Fdiv>\n        <span class=\"label\">The Mandate<\u002Fspan>\n        <p>Multiplier does not need a mobility administrator. It needs an expert who can own the knowledge, own the quality, direct the partners, and make immigration the reason deals close faster, not the reason they stall. That is precisely what I am here to build.<\u002Fp>\n        <ul class=\"cred-list\">\n          <li><b>LL.B<\u002Fb><span>speaks to counsel as a peer<\u002Fspan><\u002Fli>\n          <li><b>MBA (HR)<\u002Fb><span>translates legal into business<\u002Fspan><\u002Fli>\n          <li><b>PMP® + LSS Black Belt<\u002Fb><span>executes at enterprise scale<\u002Fspan><\u002Fli>\n          <li><b>Power BI PL-300<\u002Fb><span>makes quality visible<\u002Fspan><\u002Fli>\n          <li><b>MobilityOS Builder<\u002Fb><span>designs the product layer<\u002Fspan><\u002Fli>\n          <li><b>USILAW LLP, London<\u002Fb><span>sold immigration commercially<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====== SECTION 02 — DIAGNOSIS ====== -->\n<section id=\"diagnosis\" class=\"s-diagnosis\">\n  <div class=\"container\">\n    <div class=\"sec-head reveal in\" style=\"transition-delay: 300ms;\">\n      <span class=\"section-label\">01 — The Diagnosis<\u002Fspan>\n      <h2>What Is <span class=\"accent\">Actually<\u002Fspan> Happening Right Now<\u002Fh2>\n      <p class=\"lead\">Before the solution, the honest picture. Every EOR mobility operation at this growth stage has the same three structural problems running simultaneously, and they are all costing real money, real time, and real quality every single day.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"three-cards\">\n      <div class=\"card diag-card reveal in\" style=\"transition-delay: 300ms;\">\n        <div class=\"icon\">⏱️<\u002Fdiv>\n        <span class=\"label\">Problem 01<\u002Fspan>\n        <h3>The Answer Delay Problem<\u002Fh3>\n        <p>A client asks a standard corridor question. It enters the system, gets forwarded through two internal hands who lack confidence, lands with Fragomen, sits in their queue for 48–72 hours, returns in legal language no one can directly use, gets re-interpreted by a non-lawyer, and reaches the client 3–5 days later. Deal momentum is gone. Client trust is eroded.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card diag-card reveal in\" style=\"transition-delay: 300ms;\">\n        <div class=\"icon\">🔍<\u002Fdiv>\n        <span class=\"label\">Problem 02<\u002Fspan>\n        <h3>The Quality Visibility Problem<\u002Fh3>\n        <p>Nobody in Multiplier's leadership has clear sight into the accuracy and consistency of answers going to clients. Work is distributed across partners, email threads, and team members with no single quality gate. The same question from two different clients can receive two different answers. That inconsistency is a compliance risk, a brand risk, and a liability that compounds with every case.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card diag-card reveal in\" style=\"transition-delay: 300ms;\">\n        <div class=\"icon\">💸<\u002Fdiv>\n        <span class=\"label\">Problem 03<\u002Fspan>\n        <h3>The Cost Hemorrhage Problem<\u002Fh3>\n        <p>External counsel is being engaged for questions that already have known answers, they just have never been captured and structured internally. Fragomen charges $300–$600/hour. Repeatable, standard corridor queries being routed externally represent $9,000–$30,000 per month in avoidable legal spend. Multiplied across a year, this is a structural budget leak nobody has fully mapped.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"flow-wrap reveal in\" style=\"transition-delay: 300ms;\">\n      <h3>The Current Question Journey, How Long It Actually Takes<\u002Fh3>\n      <div class=\"flow\">\n        <div class=\"flow-box\"><span class=\"step\">01 → Client Asks<\u002Fspan><div class=\"ttl\">Client Asks<\u002Fdiv><div class=\"meta\">Day 0<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-box\"><span class=\"step\">02 → Ops Receives<\u002Fspan><div class=\"ttl\">Ops Receives<\u002Fdiv><div class=\"meta\">No framework · Day 0–1<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-box\"><span class=\"step\">03 → Forwarded<\u002Fspan><div class=\"ttl\">Forwarded to Fragomen<\u002Fdiv><div class=\"meta\">$300–600/hr · Day 1<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-box\"><span class=\"step\">04 → Returns<\u002Fspan><div class=\"ttl\">Legal Opinion Returns<\u002Fdiv><div class=\"meta\">Unusable language · Day 2–3<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-box\"><span class=\"step\">05 → Translated<\u002Fspan><div class=\"ttl\">Ops Translates<\u002Fdiv><div class=\"meta\">Quality lost · Day 4<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-box\"><span class=\"step\">06 → Answered<\u002Fspan><div class=\"ttl\">Client Gets Answer<\u002Fdiv><div class=\"meta\">Trust gone · Day 4–5<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-foot\">Current average: <b>4–5 days per query<\u002Fb> · <b>$300–600 per referral<\u002Fb> · Quality: <b>uncontrolled<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====== SECTION 03 — COST REALITY ====== -->\n<section id=\"cost\" class=\"s-cost\">\n  <div class=\"container\">\n    <div class=\"sec-head reveal in\" style=\"transition-delay: 300ms;\">\n      <span class=\"section-label\">02 — The Cost Reality<\u002Fspan>\n      <h2>The <span class=\"accent\">Number<\u002Fspan> Nobody Has Mapped Yet<\u002Fh2>\n      <p class=\"lead\">The financial damage of structural external dependency runs across three streams, and most finance teams only see the first one. When all three are mapped, the annual figure is significant enough to fund the entire internal mobility transformation and return meaningful surplus.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"cost-grid\">\n      <div>\n        <div class=\"pull-quote reveal in\" style=\"transition-delay: 300ms;\">\"Every hand the question passes through is a point of quality loss, delay, and cost. And critically, Multiplier has no visibility into what answer was given, whether it was right, or whether it solved the problem.\"<\u002Fdiv>\n\n        <div class=\"cost-row reveal in\" style=\"transition-delay: 300ms;\">\n          <div class=\"ic\">⚖️<\u002Fdiv>\n          <div>\n            <h3>Direct External Legal Spend<\u002Fh3>\n            <p style=\"color: rgb(250, 247, 247)\">Standard corridor questions being answered by $300–600/hr attorneys. At 200–400 cases/month with 60–70% externally referred, this is <b style=\"color:var(--white)\">$45,000–$90,000/month<\u002Fb> in avoidable legal fees. <span style=\"color:var(--orange)\">Annually: $540K–$1M+<\u002Fspan><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cost-row reveal in\" style=\"transition-delay: 300ms;\">\n          <div class=\"ic\">📉<\u002Fdiv>\n          <div>\n            <h3>Indirect Revenue Impact of Delays<\u002Fh3>\n            <p style=\"color: rgb(250, 247, 247)\">Every day a client waits for a feasibility answer is a day a hire does not move. Delayed hires mean deferred revenue, frustrated hiring managers, and churn risk in accounts Multiplier needs to expand. This never appears on the mobility P&amp;L but is very real.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cost-row reveal in\" style=\"transition-delay: 300ms;\">\n          <div class=\"ic\">🔄<\u002Fdiv>\n          <div>\n            <h3>Rework and Remediation Cost<\u002Fh3>\n            <p style=\"color: rgb(250, 247, 247)\">Incorrect answers from un-gated quality processes create misfiled applications, corrective legal engagements, and damaged client relationships. Conservative estimates put rework cost at <b style=\"color:var(--white)\">40–60% of direct legal spend<\u002Fb>, compounding the headline figure further.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"big-num-card reveal in\" style=\"transition-delay: 300ms;\">\n        <span class=\"lbl\">Estimated Annual Recoverable Cost<\u002Fspan>\n        <div class=\"big-num\">$540K&nbsp;–&nbsp;$1M+<\u002Fdiv>\n        <div class=\"big-num-sub\">Across direct spend, revenue delay impact, and rework, per year<\u002Fdiv>\n        <div class=\"bars\">\n          <div class=\"bar-row\">\n            <div class=\"meta\"><b>Direct External Legal Fees<\u002Fb><i>$540K–$1M<\u002Fi><\u002Fdiv>\n            <div class=\"bar-track\"><div class=\"bar-fill\" data-w=\"85\" data-done=\"1\" style=\"width: 85%;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bar-row\">\n            <div class=\"meta\"><b>Revenue Delay Indirect Loss<\u002Fb><i>Unmapped<\u002Fi><\u002Fdiv>\n            <div class=\"bar-track\"><div class=\"bar-fill\" data-w=\"65\" data-done=\"1\" style=\"width: 65%;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bar-row\">\n            <div class=\"meta\"><b>Rework &amp; Remediation<\u002Fb><i>40–60%<\u002Fi><\u002Fdiv>\n            <div class=\"bar-track\"><div class=\"bar-fill\" data-w=\"45\" data-done=\"1\" style=\"width: 45%;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bar-row\">\n            <div class=\"meta\"><b style=\"color:#a9e5c8\">Reduction Under New Model<\u002Fb><i style=\"color:#a9e5c8\">80–90%<\u002Fi><\u002Fdiv>\n            <div class=\"bar-track\"><div class=\"bar-fill green\" data-w=\"90\" data-done=\"1\" style=\"width: 90%;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====== SECTION 04 — OPERATING MODEL ====== -->\n<section id=\"model\" class=\"s-model\">\n  <div class=\"container\">\n    <div class=\"sec-head reveal in\" style=\"text-align: center; align-items: center; margin-left: auto; margin-right: auto; transition-delay: 300ms;\">\n      <span class=\"section-label\">03 — The Operating Model Shift<\u002Fspan>\n      <h2>From <span class=\"accent\">Vendor-Led<\u002Fspan> to Expert-Led<\u002Fh2>\n      <p class=\"lead\" style=\"margin-left:auto;margin-right:auto\">This is the structural inversion that changes everything. Not a process improvement, a fundamental rewrite of who owns the knowledge, who controls the brief, and who is accountable for the quality of every answer Multiplier gives.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"compare\">\n      <div class=\"state-card bad reveal\" style=\"transition-delay: 300ms;\">\n        <span class=\"tag\">Current State<\u002Fspan>\n        <h3>Partners Are Answering. Multiplier Is Waiting.<\u002Fh3>\n        <ul class=\"state-list\">\n          <li><span>External counsel sets the timeline, their availability determines your speed<\u002Fspan><\u002Fli>\n          <li><span>Partners interpret the question, often answering a legal query, not the business question<\u002Fspan><\u002Fli>\n          <li><span>Operations team forwards and re-interprets, quality lost at every translation layer<\u002Fspan><\u002Fli>\n          <li><span>No internal framework, every question looks complex, everything escalates externally<\u002Fspan><\u002Fli>\n          <li><span>Fragomen drives the relationship, you are dependent and they know it<\u002Fspan><\u002Fli>\n          <li><span>Leadership has zero quality visibility, answers leave the building unchecked<\u002Fspan><\u002Fli>\n          <li><span>Cost is open-ended, no scope control, no brief discipline, no spend ceiling<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"arrow-col reveal\" style=\"transition-delay: 300ms;\">\n        <div class=\"line\"><\u002Fdiv>\n        <span class=\"lbl\">The Inversion<\u002Fspan>\n        <div class=\"line\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"state-card good reveal\" style=\"transition-delay: 300ms;\">\n        <span class=\"tag\">New State<\u002Fspan>\n        <h3>Expert at the Centre. Partners Execute Briefs.<\u002Fh3>\n        <ul class=\"state-list\">\n          <li><span>Expert nucleus at the centre, I own every answer before it reaches anyone external<\u002Fspan><\u002Fli>\n          <li><span>Framework answers 95% of queries internally, no external referral needed<\u002Fspan><\u002Fli>\n          <li><span>When external counsel is engaged, they receive a precise brief with defined scope and output<\u002Fspan><\u002Fli>\n          <li><span>Partners complete assignments, they stop driving the conversation, we do<\u002Fspan><\u002Fli>\n          <li><span>My 19-year relationships mean partners prioritise our briefs, quality and speed improve together<\u002Fspan><\u002Fli>\n          <li><span>Every answer validated by the expert before it reaches the client, single quality gate<\u002Fspan><\u002Fli>\n          <li><span>Scope control reduces per-case external cost by 80–90% on standard case types<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"model-quote reveal\" style=\"transition-delay: 300ms;\">\"They stop being <span class=\"accent\">the answer<\u002Fspan>. They start being <span class=\"accent\">the execution<\u002Fspan>. The difference in how that feels, for your team, your clients, and your margin, is enormous.\"<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====== SECTION 05 — THREE-TIER ====== -->\n<section id=\"tiers\" class=\"s-tiers\">\n  <div class=\"container\">\n    <div class=\"tiers-head reveal\" style=\"transition-delay: 300ms;\">\n      <div>\n        <span class=\"section-label\">04 — The Three-Tier Knowledge Architecture<\u002Fspan>\n        <h2>How <span class=\"accent\">95%<\u002Fspan> of Queries Get Answered Without Fragomen<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lead\">This is not a theoretical framework. It is a designed, layered architecture where every query routes to the right level, based on complexity, not on whether someone has time to forward it. The result is a function that is genuinely self-sufficient, measurably consistent, and structurally scalable.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"tier-row reveal\" style=\"transition-delay: 300ms;\">\n      <div class=\"tier-meta\">\n        <span class=\"label\">Tier 1<\u002Fspan>\n        <h3>Customer Self-Serve<\u002Fh3>\n        <div class=\"who\">Client-facing knowledge hub<\u002Fdiv>\n        <span class=\"pill green\">Zero external cost<\u002Fspan>\n      <\u002Fdiv>\n      <p>Structured, searchable knowledge base covering every high-volume corridor, visa pathway, document checklist, government fee schedule, and compliance flag. Written in plain English for HR managers, not legal language for lawyers. When a client wants to know whether they can sponsor a Singapore national for Germany, they get the complete answer in under 2 minutes. No ticket. No team member. No legal invoice.<\u002Fp>\n      <div class=\"tier-pct\">65%<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tier-row reveal\" style=\"transition-delay: 300ms;\">\n      <div class=\"tier-meta\">\n        <span class=\"label\">Tier 2<\u002Fspan>\n        <h3>Operations via Playbooks<\u002Fh3>\n        <div class=\"who\">Internal team execution<\u002Fdiv>\n        <span class=\"pill green\">Internal cost only<\u002Fspan>\n      <\u002Fdiv>\n      <p>Standard case processing, permit applications, right-to-work verifications, renewal workflows, relocation coordination, executed by the operations team using decision-tree playbooks I have built and validated. Every case type has a documented process, a checklist, and a defined quality review before it closes. Operations team members are not guessing. They are executing a known process with a known quality standard. I audit a sample weekly to catch drift and continuously tighten the standard.<\u002Fp>\n      <div class=\"tier-pct\">28%<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tier-row reveal\" style=\"transition-delay: 300ms;\">\n      <div class=\"tier-meta\">\n        <span class=\"label\">Tier 3<\u002Fspan>\n        <h3>Expert Review<\u002Fh3>\n        <div class=\"who\">Deb, directly<\u002Fdiv>\n        <span class=\"pill green\">Internal, no external spend<\u002Fspan>\n      <\u002Fdiv>\n      <p>Cases with ambiguity, a new jurisdiction element, or a potential compliance flag come to me directly before going anywhere. I assess, determine whether it resolves internally or requires external legal input, and either handle it myself or frame the precise legal question that goes external. The team learns in real time, each Tier 3 case I handle today becomes a Tier 2 case six months from now because I explain my reasoning as I work through it.<\u002Fp>\n      <div class=\"tier-pct\">5%<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tier-row reveal\" style=\"transition-delay: 300ms;\">\n      <div class=\"tier-meta\">\n        <span class=\"label\">Tier 4<\u002Fspan>\n        <h3>External Counsel on Brief<\u002Fh3>\n        <div class=\"who\">Fragomen, scoped task only<\u002Fdiv>\n        <span class=\"pill red\">Controlled spend only<\u002Fspan>\n      <\u002Fdiv>\n      <p>Genuine legal complexity, contested applications, jurisdiction-specific legal opinions, regulatory change interpretation, precedent-setting scenarios. External counsel receives a precise brief from me: specific legal question, defined output format, clear timeline. They execute. They return to me. I validate and translate into client-ready language. The client experiences speed and confidence regardless of what happened in the background. This is the exception, not the default.<\u002Fp>\n      <div class=\"tier-pct\">2%<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====== SECTION 06 — 90-DAY ROADMAP ====== -->\n<section id=\"roadmap\" class=\"s-roadmap\">\n  <div class=\"container\">\n    <div class=\"sec-head reveal\" style=\"transition-delay: 300ms;\">\n      <span class=\"section-label\">05 — The 90-Day Build Roadmap<\u002Fspan>\n      <h2><span class=\"accent\">Phase by Phase.<\u002Fspan> Nothing Left Vague.<\u002Fh2>\n      <p class=\"lead\">This is a construction schedule, not a wish list. Every phase has specific actions, specific deliverables, and specific metrics that tell leadership whether the build is on track.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"timeline\">\n\n      <div class=\"phase reveal\" style=\"transition-delay: 300ms;\">\n        <span class=\"phase-day\">Days 1 – 30<\u002Fspan>\n        <div class=\"phase-card\">\n          <div class=\"ghost\">01<\u002Fdiv>\n          <h3>Audit, Capture &amp; Map<\u002Fh3>\n          <span class=\"theme\">\"Understand everything before touching anything\"<\u002Fspan>\n          <ul>\n            <li><span>Sit with the operations team, watch how cases move through the system, where they get stuck, what questions come in repeatedly, what gets escalated and why. Not from a distance. In the room.<\u002Fspan><\u002Fli>\n            <li><span>Document every manual process as it currently exists. A process you have not mapped is a process you cannot improve.<\u002Fspan><\u002Fli>\n            <li><span>Pull every inbound query from the last 6–12 months. Categorize by type, corridor, complexity level. Confirm the 60–70% repeatable query hypothesis.<\u002Fspan><\u002Fli>\n            <li><span>Map every external counsel touchpoint, every call, every email, every invoice. This reveals which knowledge gaps are being subsidized by legal budget.<\u002Fspan><\u002Fli>\n            <li><span>Interview every team member, surface the institutional knowledge that exists unevenly across people. Capture it. Make it available to everyone.<\u002Fspan><\u002Fli>\n            <li><span>Build relationships with Sales, Product, Legal, and Finance, establish shared language, align on the commercial mobility vision, understand what Sales most needs from mobility in live deals.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n          <div class=\"kpis\">\n            <span class=\"chip\">Complete Gap Map<\u002Fspan>\n            <span class=\"chip\">Knowledge Inventory<\u002Fspan>\n            <span class=\"chip\">Process Audit Report<\u002Fspan>\n            <span class=\"chip\">Prioritised Build List<\u002Fspan>\n            <span class=\"chip\">Leadership Presentation<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"phase reveal\" style=\"transition-delay: 300ms;\">\n        <span class=\"phase-day\">Days 31 – 60<\u002Fspan>\n        <div class=\"phase-card\">\n          <div class=\"ghost\">02<\u002Fdiv>\n          <h3>Build, Structure &amp; Activate<\u002Fh3>\n          <span class=\"theme\">\"Create the infrastructure that makes self-sufficiency possible\"<\u002Fspan>\n          <ul>\n            <li><span>Build the knowledge base for the top 10 highest-volume corridors and top 20 question categories, customer-facing guides, internal decision-tree playbooks, and country compliance briefs for each.<\u002Fspan><\u002Fli>\n            <li><span>Stand up a structured case management system, single source of truth for every case, its status, documents, SLA timeline, and assigned handler. Eliminates the majority of manual follow-up queries immediately.<\u002Fspan><\u002Fli>\n            <li><span>Design and launch the standardized case intake form, captures everything needed to open a case correctly the first time. Fixes the input; the downstream process cleans up automatically.<\u002Fspan><\u002Fli>\n            <li><span>Redesign the external counsel relationship, introduce brief templates, define Tier 4 escalation criteria in writing, set partner SLAs and begin tracking them. Partners receive precise scoped tasks, not open-ended advisory mandates.<\u002Fspan><\u002Fli>\n            <li><span>Begin joining Sales calls, provide live immigration feasibility, timeline framing, and cost objection handling for enterprise deals. Mobility becomes visible in the revenue conversation.<\u002Fspan><\u002Fli>\n            <li><span>Build the Power BI operations dashboard, visa success rates, TAT by corridor, partner SLA adherence, customer satisfaction, and revenue contribution from mobility-assisted deals.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n          <div class=\"kpis\">\n            <span class=\"chip\">Knowledge Base Live<\u002Fspan>\n            <span class=\"chip\">Case System Deployed<\u002Fspan>\n            <span class=\"chip\">5 Priority Playbooks<\u002Fspan>\n            <span class=\"chip\">Partner Protocols Set<\u002Fspan>\n            <span class=\"chip\">Dashboard Live<\u002Fspan>\n            <span class=\"chip\">Sales Integration Active<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"phase reveal\" style=\"transition-delay: 300ms;\">\n        <span class=\"phase-day\">Days 61 – 90<\u002Fspan>\n        <div class=\"phase-card\">\n          <div class=\"ghost\">03<\u002Fdiv>\n          <h3>Train, Measure &amp; Scale<\u002Fh3>\n          <span class=\"theme\">\"Close the loop with metrics and present to leadership\"<\u002Fspan>\n          <ul>\n            <li><span>Run structured team training across three levels, live case simulations using real anonymized scenarios, not classroom presentations. Build judgment, not just familiarity. Identify corridor specialists within the team.<\u002Fspan><\u002Fli>\n            <li><span>Go live with customer-facing knowledge hub. Track query deflection, what percentage of clients find their answer without raising a ticket. This is the Tier 1 baseline metric.<\u002Fspan><\u002Fli>\n            <li><span>Track first mobility-assisted deal contributions, document where mobility feasibility advice directly accelerated a deal cycle or resolved a sales objection.<\u002Fspan><\u002Fli>\n            <li><span>Build a live Q&amp;A log, every unanswered internal question that should have been in the playbook gets added. The knowledge base evolves continuously from team usage, not just from my initial build.<\u002Fspan><\u002Fli>\n            <li><span>Present Mobility QBR to leadership, before vs. after metrics on external counsel referrals, case TAT, query deflection rate, customer satisfaction, and revenue contribution.<\u002Fspan><\u002Fli>\n            <li><span>Deliver the 6–12 month expansion roadmap, next corridor priorities, automation layers, team capability investments, and mobility P&amp;L projections.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n          <div class=\"kpis\">\n            <span class=\"chip\">Deal Wins Tracked<\u002Fspan>\n            <span class=\"chip\">QBR to Leadership<\u002Fspan>\n            <span class=\"chip\">Team Certified on Playbooks<\u002Fspan>\n            <span class=\"chip\">Deflection Rate Measured<\u002Fspan>\n            <span class=\"chip\">Expansion Roadmap Delivered<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====== SECTION 07 — SAVINGS REINVESTMENT ====== -->\n<section id=\"savings\" class=\"s-savings\">\n  <div class=\"container\">\n    <div class=\"sec-head reveal\" style=\"text-align: center; align-items: center; margin-left: auto; margin-right: auto; transition-delay: 300ms;\">\n      <span class=\"section-label\">06 — The Savings &amp; Reinvestment Plan<\u002Fspan>\n      <h2>The <span class=\"accent\">Recovered Budget<\u002Fspan> Builds the Future<\u002Fh2>\n      <p class=\"lead\" style=\"margin-left:auto;margin-right:auto\">Saving money is not the goal. Redirecting it toward building a genuinely better operation is. Every dollar recovered from unnecessary external legal spend becomes an investment in the capability that makes Multiplier permanently self-sufficient in mobility.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"flow-three\">\n      <div class=\"reveal\" style=\"transition-delay: 300ms;\">\n        <span class=\"col-head red\">Where Money Is Bleeding Today<\u002Fspan>\n\n        <div class=\"savings-card red\">\n          <span class=\"typ\">Direct External Cost<\u002Fspan>\n          <h3>Fragomen &amp; Law Firm Fees<\u002Fh3>\n          <p>$300–600/hr on standard, repeatable corridor questions that should have internal answers<\u002Fp>\n          <div class=\"amt\">$540K–$1M / yr<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"savings-card red\">\n          <span class=\"typ\">Timeline Delay Cost<\u002Fspan>\n          <h3>Lost Deal Velocity<\u002Fh3>\n          <p>Delayed feasibility answers stall hiring decisions, slow enterprise deal cycles, and drive account churn<\u002Fp>\n          <div class=\"amt\">Unmapped but real<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"savings-card red\">\n          <span class=\"typ\">Rework Cost<\u002Fspan>\n          <h3>Quality Failure Remediation<\u002Fh3>\n          <p>Incorrect answers, misfiled applications, client relationship repair, 40–60% of direct legal spend<\u002Fp>\n          <div class=\"amt\">40–60% premium<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"savings-card red\">\n          <span class=\"typ\">Hidden Opportunity Cost<\u002Fspan>\n          <h3>Senior Team Time Consumed<\u002Fh3>\n          <p>Leadership and senior ops time managing vendor chaos rather than building strategy and capability<\u002Fp>\n          <div class=\"amt\">Unquantified daily<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"redirect reveal\" style=\"transition-delay: 300ms;\">\n        <div class=\"circle\">→<\u002Fdiv>\n        <span class=\"lbl\">Redirected<br>Into<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"reveal\" style=\"transition-delay: 300ms;\">\n        <span class=\"col-head green\">Where It Gets Reinvested<\u002Fspan>\n\n        <div class=\"savings-card green\">\n          <span class=\"typ\">Investment 01<\u002Fspan>\n          <h3>Team Capability Development<\u002Fh3>\n          <p>Corridor specialists, live case training, continuous knowledge development, ops team becomes a genuine mobility advisory function, not a forwarding service<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"savings-card green\">\n          <span class=\"typ\">Investment 02<\u002Fspan>\n          <h3>Knowledge Base Expansion<\u002Fh3>\n          <p>New country profiles, regulatory update cycles, corridor deep-dives commissioned once, captured internally, never paid for again<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"savings-card green\">\n          <span class=\"typ\">Investment 03<\u002Fspan>\n          <h3>Technology &amp; Automation<\u002Fh3>\n          <p>Documented, standardized processes become automation candidates, case intake, doc collection, SLA tracking, partner briefs. Scale without proportional headcount growth<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"savings-card green\">\n          <span class=\"typ\">Investment 04<\u002Fspan>\n          <h3>Product Intelligence Feed<\u002Fh3>\n          <p>Corridor guides become in-app content. Decision frameworks become platform tools. Compliance flags become automated alerts. The knowledge base compounds into product value<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====== SECTION 08 — PORTAL ====== -->\n<section id=\"portal\" class=\"s-portal\">\n  <div class=\"container\">\n    <div class=\"portal-grid\">\n      <div class=\"reveal\" style=\"transition-delay: 300ms;\">\n        <span class=\"section-label\">07 — The Consulting Intelligence Portal<\u002Fspan>\n        <h2>The Knowledge Asset That <span class=\"accent\">Pays Forward<\u002Fspan><\u002Fh2>\n        <p class=\"lead\" style=\"margin-top:18px\">As the knowledge hub matures, corridor guides, compliance briefs, visa pathway frameworks, right-to-work references, regulatory update libraries across 21+ countries, what we are building is one of the most comprehensive, vetted, real-world immigration intelligence assets in the EOR industry. That asset does not have to stay internal.<\u002Fp>\n\n        <div class=\"pull-quote\" style=\"margin-top:30px\">\"The investment is the same. The return is compounded. We build it once \n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"net-card reveal\" style=\"transition-delay: 300ms;\">\n          <div class=\"ic\">🌐<\u002Fdiv>\n          <div>\n            <h3>21-Country Vendor Ecosystem, Built at Teradata<\u002Fh3>\n            <p>A live, governed network of immigration law firms, tax advisors, and relocation service partners across APAC, EMEA, LATAM, and Americas. Partner SLA frameworks, cost models, and performance review cadences already operational, activates immediately.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"net-card reveal\" style=\"transition-delay: 300ms;\">\n          <div class=\"ic\">🏢<\u002Fdiv>\n          <div>\n            <h3>Enterprise HR &amp; Mobility Leadership Network<\u002Fh3>\n            <p>Senior relationships across Infosys, Capgemini, Birlasoft, Evalueserve, and Teradata alumni communities, a ready-made pipeline of potential Multiplier enterprise customers who have trusted my immigration judgment for years.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"net-card reveal\" style=\"transition-delay: 300ms;\">\n          <div class=\"ic\">🇬🇧<\u002Fdiv>\n          <div>\n            <h3>UK Immigration Sales Network, USILAW LLP, London<\u002Fh3>\n            <p>Commercial and legal contacts across the UK immigration landscape, law firms, Home Office compliance professionals, and employer-side HR leaders who managed sponsored worker programs. The only background that combines immigration selling with immigration delivery.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====== SECTION 10 — CREDENTIALS ====== -->\n<section id=\"creds\" class=\"s-creds\">\n  <div class=\"container\">\n    <div class=\"sec-head reveal\" style=\"text-align: center; align-items: center; margin-left: auto; margin-right: auto; transition-delay: 300ms;\">\n      <span class=\"section-label\">09 — Why These Credentials Matter Here<\u002Fspan>\n      <h2>19 Years. <span class=\"accent\">Both Languages.<\u002Fspan> One Function.<\u002Fh2>\n      <p class=\"lead\" style=\"margin-left:auto;margin-right:auto\">These are not decorative qualifications. Each credential maps precisely to a specific gap in Multiplier's current mobility operation, and each one makes the transformation I have described faster, cleaner, and more durable.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"cred-grid\">\n      <div class=\"cred-tile reveal\" style=\"transition-delay: 300ms;\">\n        <div class=\"ic\">⚖️<\u002Fdiv>\n        <h3>LL.B<\u002Fh3>\n        <span class=\"role\">Bachelor of Laws<\u002Fspan>\n        <p>Enables real peer-to-peer conversations with immigration attorneys, not client-to-advisor conversations. Reduces brief translation errors, eliminates misinterpretation of legal opinions, and makes the quality gate at Tier 3 genuinely reliable. No other mobility manager brings this combination.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cred-tile reveal\" style=\"transition-delay: 300ms;\">\n        <div class=\"ic\">🎓<\u002Fdiv>\n        <h3>MBA (HR)<\u002Fh3>\n        <span class=\"role\">University of Sunderland, UK<\u002Fspan>\n        <p>Translates legal and operational insight into business strategy and commercial language. Enables direct, productive conversations with Sales, Finance, and C-suite, not just HR and Legal. The business mindset requirement in the JD is the MBA in practice.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cred-tile reveal\" style=\"transition-delay: 300ms;\">\n        <div class=\"ic\">📋<\u002Fdiv>\n        <h3>PMP®<\u002Fh3>\n        <span class=\"role\">Project Management Professional<\u002Fspan>\n        <p>Critical for managing complex, multi-stakeholder mobility programs at enterprise scale. Simultaneously coordinating across Sales, Legal, Product, and 21+ country vendor ecosystems, this is a program management challenge as much as a mobility challenge. Structured delivery methodology already in place.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cred-tile reveal\" style=\"transition-delay: 300ms;\">\n        <div class=\"ic\">⚙️<\u002Fdiv>\n        <h3>LSS Black Belt<\u002Fh3>\n        <span class=\"role\">Lean Six Sigma Black Belt<\u002Fspan>\n        <p>Applied directly to mobility operations, standardized SOPs, reduced error rates, improved approval success rates, eliminated rework loops. At Teradata, delivered 25–30% reduction in case processing TAT through LSS workflow redesign. The operational excellence mandate is already my methodology.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cred-tile reveal\" style=\"transition-delay: 300ms;\">\n        <div class=\"ic\">📊<\u002Fdiv>\n        <h3>Power BI PL-300<\u002Fh3>\n        <span class=\"role\">Microsoft Certified Data Analyst<\u002Fspan>\n        <p>Built operational dashboards tracking visa approval rates, TAT, SLA performance, and customer satisfaction at Teradata. The visibility problem Multiplier currently has, no sight into quality, cost, or performance, is solved by this capability from Day 1. Leadership sees the numbers, not anecdotes.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cred-tile reveal\" style=\"transition-delay: 300ms;\">\n        <div class=\"ic\">🤖<\u002Fdiv>\n        <h3>MobilityOS Builder<\u002Fh3>\n        <span class=\"role\">AI-Powered SaaS Platform Founder<\u002Fspan>\n        <p>Currently building an AI-powered case management platform using Bubble, Supabase, Relevance AI, and Make. Brings genuine product-builder thinking to operational mobility challenges, understands how workflows become features, how knowledge becomes intelligence, and how the operations layer feeds the product layer.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tech-section reveal\" style=\"transition-delay: 300ms;\">\n      <span class=\"lbl\">Technology &amp; Systems, Immediately Deployable<\u002Fspan>\n      <div class=\"chips\">\n        <span class=\"chip-dark\">Workday<\u002Fspan>\n        <span class=\"chip-dark\">ServiceNow<\u002Fspan>\n        <span class=\"chip-dark\">INSZoom<\u002Fspan>\n        <span class=\"chip-dark\">BambooHR<\u002Fspan>\n        <span class=\"chip-dark\">Power BI<\u002Fspan>\n        <span class=\"chip-dark\">Relevance AI<\u002Fspan>\n        <span class=\"chip-dark\">Make<\u002Fspan>\n        <span class=\"chip-dark\">Integromat<\u002Fspan>\n        <span class=\"chip-dark\">Supabase<\u002Fspan>\n        <span class=\"chip-dark\">Zoho CRM<\u002Fspan>\n        <span class=\"chip-dark\">SharePoint<\u002Fspan>\n        <span class=\"chip-dark\">Ceipal<\u002Fspan>\n        <span class=\"chip-dark\">JobDiva<\u002Fspan>\n        <span class=\"chip-dark\">Advanced Excel<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====== SECTION 11 — CLOSING ====== -->\n<section id=\"close\" class=\"s-close\">\n  <div class=\"container\">\n    <span class=\"section-label reveal\" style=\"transition-delay: 300ms;\">10, The Position Statement<\u002Fspan>\n    <h2 class=\"close-h reveal\" style=\"transition-delay: 300ms;\">Mobility,<br>Redefined as<br><span class=\"accent\">Revenue<\u002Fspan><\u002Fh2>\n\n    <p class=\"close-body reveal\" style=\"transition-delay: 300ms;\">Right now, Multiplier is paying external parties to answer questions that should have known, internal answers. That payment comes in three forms, direct legal fees, delayed timelines that cost deals and retention, and quality inconsistency that creates rework and risk. The total cost of this is significant, it is recurring, and it is largely invisible because no one has mapped it end to end.<\u002Fp>\n\n    <p class=\"close-body reveal\" style=\"transition-delay: 300ms;\">What I am building in 90 days is the architecture that stops that payment permanently. A three-tier knowledge framework that answers 95% of mobility queries internally. An expert at the centre who owns quality across the entire chain. A vendor ecosystem that executes assignments rather than driving direction. A consulting intelligence portal that turns the knowledge asset into a product. And a team that is genuinely growing, not forwarding and waiting.<\u002Fp>\n\n    <p class=\"close-quote reveal\" style=\"transition-delay: 300ms;\">\"The question is not whether this can be built. The question is <span class=\"accent\">how fast you want to move<\u002Fspan>, and whether you want the person who has done it before, or someone who needs to figure it out first.\"<\u002Fp>\n\n    <div class=\"close-pills reveal\" style=\"transition-delay: 300ms;\">\n      <span class=\"pill\">19 Years Experience<\u002Fspan>\n      <span class=\"pill\">LL.B + MBA + PMP® + LSS Black Belt<\u002Fspan>\n      <span class=\"pill\">21+ Countries Managed<\u002Fspan>\n      <span class=\"pill\">Immigration Sales, London<\u002Fspan>\n      <span class=\"pill\">Expert Nucleus Model<\u002Fspan>\n      <span class=\"pill\">Three-Tier Architecture<\u002Fspan>\n      <span class=\"pill\">Consulting Portal Vision<\u002Fspan>\n      <span class=\"pill\">Power BI Analytics<\u002Fspan>\n      <span class=\"pill\">56-Member Team Leadership<\u002Fspan>\n      <span class=\"pill\">EU · UK · APAC · US Coverage<\u002Fspan>\n      <span class=\"pill\">Day 1 Network Ready<\u002Fspan>\n      <span class=\"pill\">MobilityOS Builder<\u002Fspan>\n    <\u002Fdiv>\n\n    <footer class=\"reveal\" style=\"transition-delay: 300ms;\">\n      <div class=\"col\"><span class=\"lbl\">Name<\u002Fspan><div class=\"val\">Deb Gogoi<\u002Fdiv><\u002Fdiv>\n      <div class=\"col\"><span class=\"lbl\">Location<\u002Fspan><div class=\"val\">Mumbai, India<\u002Fdiv><\u002Fdiv>\n      <div class=\"col\"><span class=\"lbl\">Email<\u002Fspan><div class=\"val\">debajyoti.gogoi@gmail.com<\u002Fdiv><\u002Fdiv>\n      <div class=\"col\"><span class=\"lbl\">Mobile<\u002Fspan><div class=\"val\">+91 99100 28706<\u002Fdiv><\u002Fdiv>\n      <div class=\"col\"><span class=\"lbl\">Role<\u002Fspan><div class=\"val\">Mobility Leader<\u002Fdiv><\u002Fdiv>\n      <div class=\"col\"><span class=\"lbl\">Company<\u002Fspan><div class=\"val\">Multiplier<\u002Fdiv><\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script>\n/* ===== Custom cursor ===== */\n(function(){\n  const dot = document.getElementById('cdot');\n  const ring = document.getElementById('cring');\n  let mx=window.innerWidth/2, my=window.innerHeight/2;\n  let rx=mx, ry=my;\n  window.addEventListener('mousemove',e=>{\n    mx=e.clientX; my=e.clientY;\n    dot.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%)`;\n  });\n  function loop(){\n    rx += (mx-rx)*0.12;\n    ry += (my-ry)*0.12;\n    ring.style.transform = `translate(${rx}px,${ry}px) translate(-50%,-50%)`;\n    requestAnimationFrame(loop);\n  }\n  loop();\n  document.querySelectorAll('a, .card, .tier-row, .cred-tile, .net-card, .savings-card, .prop, .pill, .chip-dark, button').forEach(el=>{\n    el.addEventListener('mouseenter',()=>{ ring.style.width='52px'; ring.style.height='52px'; ring.style.borderColor='#FF7A30';});\n    el.addEventListener('mouseleave',()=>{ ring.style.width='36px'; ring.style.height='36px'; ring.style.borderColor='#FF5A00';});\n  });\n})();\n\n/* ===== Progress bar ===== */\n(function(){\n  const bar = document.getElementById('progress');\n  function upd(){\n    const h = document.documentElement;\n    const max = h.scrollHeight - h.clientHeight;\n    const p = max>0 ? (h.scrollTop/max)*100 : 0;\n    bar.style.width = p + '%';\n  }\n  window.addEventListener('scroll', upd, {passive:true});\n  upd();\n})();\n\n/* ===== Reveal on scroll ===== */\n(function(){\n  const els = document.querySelectorAll('.reveal');\n  els.forEach((el,i)=>{\n    el.style.transitionDelay = (Math.min(i,5)*60) + 'ms';\n  });\n  const obs = new IntersectionObserver(entries=>{\n    entries.forEach(e=>{\n      if(e.isIntersecting){\n        e.target.classList.add('in');\n        // counters\n        e.target.querySelectorAll('[data-count]').forEach(c=>{\n          if(c.dataset.done) return;\n          c.dataset.done='1';\n          const target = parseInt(c.dataset.count,10);\n          const suffix = c.dataset.suffix || '';\n          let n=0; const dur=1400; const start=performance.now();\n          function tick(t){\n            const p = Math.min(1,(t-start)/dur);\n            const eased = 1 - Math.pow(1-p,3);\n            n = Math.floor(eased*target);\n            c.textContent = n + suffix;\n            if(p<1) requestAnimationFrame(tick);\n            else c.textContent = target + suffix;\n          }\n          requestAnimationFrame(tick);\n        });\n        // bars\n        e.target.querySelectorAll('.bar-fill').forEach(b=>{\n          if(b.dataset.done) return;\n          b.dataset.done='1';\n          requestAnimationFrame(()=>{ b.style.width = b.dataset.w + '%'; });\n        });\n        obs.unobserve(e.target);\n      }\n    });\n  },{threshold:0.08});\n  els.forEach(el=>obs.observe(el));\n})();\n\n/* ===== Nav scroll-spy ===== */\n(function(){\n  const links = document.querySelectorAll('nav.topnav a[data-target]');\n  const targets = [...links].map(a=>document.getElementById(a.dataset.target)).filter(Boolean);\n  function spy(){\n    const y = window.scrollY + window.innerHeight*0.32;\n    let active = targets[0];\n    targets.forEach(t=>{ if(t.offsetTop <= y) active = t; });\n    links.forEach(a=>a.classList.toggle('active', a.dataset.target===active.id));\n  }\n  window.addEventListener('scroll', spy, {passive:true});\n  spy();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
